<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
	<link rel="stylesheet" href="../resources/css/login.css" />
	<title>Pronósticos Futboleros</title>
	<link rel="shortcut icon"
		href="#{facesContext.externalContext.requestContextPath}/imagenes/icono_pronostico.ico"
		type="image/x-icon" />
	<link rel="icon"
		href="#{facesContext.externalContext.requestContextPath}/imagenes/icono_pronostico.ico"
		type="image/x-icon" />

</h:head>
<!-- <ui:composition template="../templates/layout.xhtml">
	<ui:define name="pageTitle">Cambio Contraseña</ui:define>
	<ui:define name="pageContent" bootsFacesDecorator="true">
 -->
<body>
	<h:form id="login">
		<p:growl id="mensajeAlerta" showDetail="true" sticky="true" />

		<div class="container">
			<div class="brand-title">Cambio Contraseña</div>
			<br/>
			<div class="inputs">
				<p:outputLabel for="txtOld" value="Contraseña Actual" />
				<span class="ui-input-icon-left ancho-total"> 
					<i class="pi pi-key" /> 
					<p:password id="txtOld"
						type="" 
						value="#{resetearClaveCtrl.claveAnterior}"
						placeholder="Contraseña Actual"
						requiredMessage="El campo Contraseña Actual es obligatorio"
						immediate="true"
						required="true" />
				</span>

				<p:outputLabel for="txtNueva_1" value="Contraseña Nueva" />
				<span class="ui-input-icon-left ancho-total"> 
					<i class="pi pi-key" /> 
					<p:password id="txtNueva_1"
						type="" 
						value="#{resetearClaveCtrl.nuevaClave}"
						placeholder="Contraseña"
						required="true"
						requiredMessage="El campo Contraseña es obligatorio"
						immediate="true" />
				</span>
				
				<p:outputLabel for="txtNueva_2" value="Confirmar Contraseña Nueva" />
				<span class="ui-input-icon-left ancho-total"> 
					<i class="pi pi-key" /> 
					<p:password id="txtNueva_2"
						type="" 
						value="#{resetearClaveCtrl.nuevaClaveConfirmacion}"
						placeholder="Contraseña"
						required="true"
						requiredMessage="El campo Confirmación es obligatorio"
						immediate="true" />
				</span>
				<br/><br/>
				<p:commandButton id="btnConsultar" 
					value="Cambiar Clave"
					update="@form" 
					actionListener="#{resetearClaveCtrl.cambiarClave}"
					icon="pi pi-chevron-right">
				</p:commandButton>
				<br/>
				<p:commandButton id="btnCancelar" 
					value="Cancelar"
					update="@form" 
					actionListener="#{resetearClaveCtrl.cancelar}"
					icon="pi pi-chevron-right" 
					immediate="true">
				</p:commandButton>

			</div>
		</div>
	</h:form>
</body>
</html>
