<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:b="http://bootsfaces.net/ui" xmlns:p="http://primefaces.org/ui">

<h:head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
	<link rel="stylesheet" href="resources/css/login.css" />
	<title>Pronósticos Futboleros</title>
	<link rel="shortcut icon"
		href="#{facesContext.externalContext.requestContextPath}/imagenes/icono_pronostico.ico"
		type="image/x-icon" />
	<link rel="icon"
		href="#{facesContext.externalContext.requestContextPath}/imagenes/icono_pronostico.ico"
		type="image/x-icon" />
	
</h:head>
<body>
	<h:form id="login">
		<p:growl id="mensajeAlerta" showDetail="true" sticky="true" />

		<div class="container">
			<div class="brand-logo">
				<h:graphicImage value="/imagenes/logo_pronostico.jpg"
					style="width: 100%; height: 100%; object-fit: cover; border-radius: 20%;" />
			</div>
			<div class="brand-title">COPA MUNDIAL DE FÚTBOL 2026</div>
			
			<div class="inputs">
				<p:outputLabel for="txtUsuario" value="Cédula" />
				<span class="ui-input-icon-left  ancho-total"> 
					<i class="pi pi-user" /> 
					<p:inputText id="txtUsuario"
						value="#{loginController.username}" 
						placeholder="Número de Cédula"
						requiredMessage="El campo Usuario es obligatorio" 
						immediate="true"/>
				</span>

				<p:outputLabel for="txtContrasena" value="Contraseña" />
				<span class="ui-input-icon-left ancho-total"> 
					<i class="pi pi-key" /> 
					<p:password id="txtContrasena"
						value="#{loginController.password}"
						placeholder="Contraseña"
						requiredMessage="El campo Contraseña es obligatorio"
						immediate="true" />
				</span>
				<br/>
				<p:commandButton id="btnConsultar" 
					value="Ingresar" 
					update="@form"
					icon="pi pi-chevron-right" 
					action="#{loginController.login}">
				</p:commandButton>

				<p:commandLink id="btnRecuperar"
					process="@this" 
					value="Recuperar contraseña"
					onclick="PF('dlgContrasena').show()">
				</p:commandLink>
			</div>
		</div>
	</h:form>
	<p:dialog header="Recuperar contraseña" 
		widgetVar="dlgContrasena"
		hideEffect="explode" 
		modal="true" 
		responsive="true" 
		id="dlgRecuperar"
		fitViewport="true">
		
		<h:form id="recuperar">
			<div>
				<div class="inputs">
					<p:outputLabel for="txtLogin" value="Cédula" />
					<p:inputText id="txtLogin" 
						value="#{loginController.usuarioRecuperar}"
						placeholder="Número Cédula"
						required="true">
						<p:ajax process="@this" partialSubmit="true" />
					</p:inputText>
					<p:outputLabel for="txtCorreo" value="Correo electrónico" />
					<p:inputText id="txtCorreo" 
						value="#{loginController.correoRecuperar}"
						placeholder="Correo electrónico"
						required="true">
						<p:ajax process="@this" partialSubmit="true" />
					</p:inputText>
				</div>
			</div>
			<br/>
			<div style="text-align: center;">				
				<p:commandButton value="Aceptar" 
					styleClass="ui-confirmdialog-yes"
					icon="pi pi-check" 
					update=":login:mensajeAlerta"
					oncomplete="PF('dlgContrasena').hide()"
					process="@form"
					actionListener="#{loginController.recuperarContrasenaCedula}">
				</p:commandButton>				
			</div>
		</h:form>
	</p:dialog>
</body>
</html>
